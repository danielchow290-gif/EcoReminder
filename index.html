<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReminder AI</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #a8e063, #56ab2f);
  color: white;
  padding-top: 50px;
}

#jam {
  font-size: 40px;
  margin: 20px;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #2e7d32;
}

input {
  padding: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<h1>♻️ EcoReminder AI</h1>
<h2 id="jam"></h2>

<p>Atur jam buang sampah:</p>
<input type="time" id="setJam">

<br><br>
<button onclick="simpanJam()">💾 Simpan Jam</button>

<br><br>
<button onclick="ingat()">🔔 Tes Alarm</button>

<script>
function format(n){
  return n<10 ? "0"+n : n;
}

// jam realtime
setInterval(function(){
  var w = new Date();
  document.getElementById("jam").innerHTML =
    format(w.getHours()) + ":" +
    format(w.getMinutes()) + ":" +
    format(w.getSeconds());
},1000);

// simpan jam ke memori
function simpanJam(){
  var jam = document.getElementById("setJam").value;
  localStorage.setItem("jamReminder", jam);
  alert("Jam disimpan: " + jam);
}

// tombol tes
function ingat(){
  alert("Saatnya buang sampah! ♻️");
}

// cek alarm
var sudah = false;

setInterval(function(){
  var w = new Date();
  var jam = localStorage.getItem("jamReminder");

  if(jam){
    var jamSplit = jam.split(":");
    var j = parseInt(jamSplit[0]);
    var m = parseInt(jamSplit[1]);

    if(w.getHours()==j && w.getMinutes()==m && !sudah){
      alert("EcoReminder: Buang sampah sekarang! ♻️");
      sudah = true;
    }

    if(w.getMinutes()!=m){
      sudah = false;
    }
  }
},60000);
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoReminder AI</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
  background: linear-gradient(to bottom, #a8e063, #56ab2f);
  color: white;
  padding-top: 50px;
}

h1 {
  font-size: 30px;
}

#jam {
  font-size: 45px;
  margin: 20px;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #2e7d32;
  margin: 5px;
}

input {
  padding: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}
</style>
</head>

<body>

<h1>♻️ EcoReminder AI</h1>
<h2 id="jam"></h2>

<p>Atur jam buang sampah:</p>
<input type="time" id="setJam">

<br><br>
<button onclick="simpanJam()">💾 Simpan Jam</button>

<br>
<button onclick="ingat()">🔔 Tes Alarm</button>

<script>
// format 2 digit
function format(n){
  return n < 10 ? "0" + n : n;
}

// JAM REALTIME
setInterval(function(){
  var w = new Date();
  document.getElementById("jam").innerHTML =
    format(w.getHours()) + ":" +
    format(w.getMinutes()) + ":" +
    format(w.getSeconds());
},1000);

// SIMPAN JAM
function simpanJam(){
  var jam = document.getElementById("setJam").value;

  if(!jam){
    alert("Pilih jam dulu!");
    return;
  }

  localStorage.setItem("jamReminder", jam);
  alert("Jam disimpan: " + jam);
}

// TES MANUAL
function ingat(){
  alert("Saatnya buang sampah! ♻️");
}

// AUTO REMINDER (FIX TOTAL)
var sudah = false;

setInterval(function(){
  var w = new Date();
  var jam = localStorage.getItem("jamReminder");

  if(jam){
    var split = jam.split(":");
    var j = parseInt(split[0]);
    var m = parseInt(split[1]);

    if(w.getHours() == j && w.getMinutes() == m && !sudah){
      alert("EcoReminder: Buang sampah sekarang! ♻️");
      sudah = true;
    }

    // reset biar bisa muncul lagi besok
    if(w.getMinutes() != m){
      sudah = false;
    }
  }
},1000);
</script>

</body>
</html>
